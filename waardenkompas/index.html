<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />

    <title>Waardenkompas — Ontdek wat jij eigenlijk voelt</title>
    <meta name="description" content="Een rustige plek om je waarden, voorkeuren en identiteit te ontdekken. Zonder oordeel. Jij bent de autoriteit." />
    <meta name="theme-color" content="#5B8C5A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Waardenkompas" />

    <!-- Open Graph -->
    <meta property="og:title" content="Waardenkompas" />
    <meta property="og:description" content="Ontdek wat jij eigenlijk voelt, wilt en kiest. Een reflectie-app met AI-patroonherkenning." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Fonts: preconnect + preload for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      /* Critical CSS: prevent flash of unstyled content */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        min-height: 100vh;
        min-height: 100dvh;
        background: linear-gradient(170deg, #FFFCF7 0%, #F7F3ED 40%, #F2EDE5 100%);
        font-family: 'DM Sans', sans-serif;
        color: #3D3427;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::selection { background: rgba(91, 140, 90, 0.2); }
      textarea::placeholder, input::placeholder { color: #C4B9AA; }

      /* Safe area padding for notched devices */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
